<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonpaw Prints — Board Book Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script>if(typeof jspdf==='undefined')document.title='⚠️ jsPDF failed to load — check network';</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0ebe2;font-family:'Libre Baskerville',Georgia,serif;color:#2c2519;min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:32px 24px}
h1{font-family:'Playfair Display',Georgia,serif;font-size:30px;color:#1e2a4a;margin:8px 0 2px}
h2{font-family:'Playfair Display',Georgia,serif;font-size:26px;color:#1e2a4a;margin-bottom:4px}
.sub{color:#8a8578;font-size:14px;margin-bottom:20px}
.brand{font-size:12px;letter-spacing:0.2em;color:#b8a06a;text-transform:uppercase;font-weight:700}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 20px rgba(30,42,74,0.06);border:1px solid #e8e4dc;margin-bottom:24px}

/* Step bar */
.steps{display:flex;margin-bottom:28px}
.step{display:flex;align-items:center;flex:1}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all 0.3s}
.step-num.active{background:#1e2a4a;color:#f0c950}
.step-num.current{box-shadow:0 0 0 3px rgba(240,201,80,0.3)}
.step-num.inactive{background:#e2ddd5;color:#8a8578}
.step-label{margin-left:5px;font-size:11px;white-space:nowrap}
.step-line{flex:1;height:2px;margin:0 6px}

/* Form */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.full{grid-column:1/-1}
label.lbl{display:block;font-size:12px;font-weight:600;color:#5a5347;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase}
input.fld,select.fld,textarea.fld{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d4cfc7;font-size:15px;font-family:'Libre Baskerville',Georgia,serif;background:#faf8f4;outline:none}
textarea.fld{min-height:60px;resize:vertical;line-height:1.5}

/* Buttons */
.btn{padding:12px 32px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Libre Baskerville',Georgia,serif;border:none;transition:all 0.2s}
.btn-primary{background:#1e2a4a;color:#f0c950}
.btn-secondary{background:transparent;color:#5a5347;border:1px solid #d4cfc7;font-weight:400}
.btn-outline{background:transparent;color:#1e2a4a;border:1px solid #1e2a4a;font-weight:400}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:11px;font-weight:400}
.btn:disabled{opacity:0.5;cursor:default}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}

/* Photos */
.photo-grid{display:flex;gap:8px;flex-wrap:wrap}
.photo-thumb{width:100px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #d4cfc7;background:#eee}
.photo-wrap{position:relative;display:inline-block}
.photo-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:#8b3a2f;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-add{width:100px;height:100px;border-radius:8px;border:2px dashed #d4cfc7;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#f5f0e5;font-size:20px;color:#8a8578}

/* Panels */
.panel{padding:20px;background:#faf8f4;border-radius:12px;border:1px solid #e8e4dc;margin-bottom:16px}
.panel-dashed{border-style:dashed}
.panel-error{background:#fdf0ef;color:#8b3a2f}
.section-label{font-size:11px;font-weight:700;color:#b8a06a;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.hint{font-size:12px;color:#8a8578;margin-bottom:8px}
.divider{border-top:1px solid #e8e4dc;padding-top:20px;margin-bottom:20px}

/* Image grid */
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.img-card{border-radius:8px;overflow:hidden;border:1px solid #e8e4dc;background:#faf8f4}
.img-slot{aspect-ratio:3/2;background:#1e2a4a;position:relative;overflow:hidden}
.img-slot img{width:100%;height:100%;object-fit:cover}
.img-pending{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#5a6a8a;font-size:11px}
.img-bar{padding:6px 8px;display:flex;align-items:center;justify-content:space-between}
.img-bar span{font-size:10px;color:#5a5347;font-weight:600}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:32px;height:32px;border:3px solid rgba(240,201,80,0.3);border-top-color:#f0c950;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}

/* Spread preview */
.spread{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e8e4dc;margin-bottom:20px}
.spread-half{flex:1;position:relative;overflow:hidden;background:#1e2a4a}
.spread-half img{width:100%;height:100%;object-fit:cover}

/* Export list */
.export-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#faf8f4;border-radius:8px;border:1px solid #e8e4dc;margin-bottom:8px}
.export-name{font-weight:600;font-size:13px;color:#1e2a4a}
.export-size{margin-left:8px;font-size:11px;color:#8a8578}
.check{color:#4a7a4a;font-size:12px;margin-right:6px}

.footer{text-align:center;margin-top:20px;font-size:11px;color:#b8a06a}
.mono{font-family:monospace;background:#e8e4dc;padding:1px 5px;border-radius:3px}
.hidden{display:none}

/* Flipbook */
.bp-spread{width:100%;display:block;opacity:0;position:absolute;top:0;left:0;transition:opacity 0.45s ease}
.bp-spread.active{opacity:1;position:relative}
.bp-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);cursor:pointer;transition:all 0.2s;border:none;padding:0}
.bp-dot.active{background:#c9a44a;transform:scale(1.4)}
.bp-dot:hover{background:#e8c96e}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="login-gate" class="wrap" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
  <div class="card" style="max-width:400px;text-align:center">
    <div class="brand">Moonpaw Prints</div>
    <h2 style="margin-top:8px">Admin Access</h2>
    <p class="sub">Enter password to access the pipeline.</p>
    <input class="fld" type="password" id="gate-pw" placeholder="Password" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')checkGate()">
    <div id="gate-error" style="color:#8b3a2f;font-size:13px;margin-bottom:8px;display:none">Incorrect password</div>
    <button class="btn btn-primary" style="width:100%" onclick="checkGate()">Enter</button>
  </div>
</div>

<!-- PIPELINE (hidden until authenticated) -->
<div id="pipeline" class="wrap" style="display:none">
  
  <!-- Admin Nav -->
  <div style="display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid #e8e4dc;padding-bottom:12px">
    <button class="btn btn-sm" id="nav-pipeline" onclick="showTab('pipeline-content')" style="background:#1e2a4a;color:#f0c950">Pipeline</button>
    <button class="btn btn-sm btn-secondary" id="nav-samples" onclick="showTab('samples-content')">Sample Books</button>
  </div>

  <!-- Pipeline Tab -->
  <div id="pipeline-content">
    <div style="text-align:center;margin-bottom:28px">
      <div class="brand">Moonpaw Prints</div>
      
      <h1>Board Book Pipeline</h1>
      <p class="sub" style="margin-bottom:0">Photos → Reference Sheet → Story → Images → Preview → Print PDFs</p>
    </div>
    <div id="stepbar" class="steps"></div>
    <div class="card" id="main"></div>
    <div class="footer">🐾 API key & photos stay in your browser — never stored or logged.</div>
  </div>

  <!-- Sample Books Tab -->
  <div id="samples-content" style="display:none">
    <div id="samples-container">
      <div style="text-align:center;padding:60px;color:#8a8578;font-style:italic">Loading sample books...</div>
    </div>
  </div>
</div>

<script>
// ── PASSWORD GATE ────────────────────────────────────────────────────────
const GATE_HASH="8ffa10986c3f016e56cb9ce631ed63bcd44efd438795b0ea47e0c9589b080f6f";

async function sha256(str){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function checkGate(){
  const pw=document.getElementById("gate-pw").value;
  const hash=await sha256(pw);
  if(hash===GATE_HASH){
    document.getElementById("login-gate").style.display="none";
    document.getElementById("pipeline").style.display="block";
    sessionStorage.setItem("mp_auth","1");
    render();
  } else {
    document.getElementById("gate-error").style.display="block";
    document.getElementById("gate-pw").value="";
    document.getElementById("gate-pw").focus();
  }
}

// Auto-unlock if already authenticated this session
if(sessionStorage.getItem("mp_auth")==="1"){
  document.getElementById("login-gate").style.display="none";
  document.getElementById("pipeline").style.display="block";
}

// ── TAB NAVIGATION ──────────────────────────────────────────────────────
function showTab(tabId){
  document.getElementById("pipeline-content").style.display=tabId==="pipeline-content"?"block":"none";
  document.getElementById("samples-content").style.display=tabId==="samples-content"?"block":"none";
  document.getElementById("nav-pipeline").className=tabId==="pipeline-content"?"btn btn-sm":"btn btn-sm btn-secondary";
  document.getElementById("nav-samples").className=tabId==="samples-content"?"btn btn-sm":"btn btn-sm btn-secondary";
  if(tabId==="pipeline-content") render();
  if(tabId==="samples-content") loadSampleBooks();
}

// ── FLIPBOOK ────────────────────────────────────────────────────────────
const books={};

async function loadSampleBooks(){
  const container=document.getElementById("samples-container");
  try{
    const r=await fetch("samples.json?t="+Date.now());
    if(!r.ok) throw new Error("No samples yet");
    const samples=await r.json();
    if(!samples.length) throw new Error("No samples yet");
    
    let html="";
    samples.forEach(book=>{
      const bookId=book.id;
      books[bookId]={current:0,pages:book.pages};
      
      html+=`<div style="padding:60px 24px;background:#0c1a3a;border-radius:14px;margin-bottom:24px;position:relative;overflow:hidden">
        <div style="position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1.5px 1.5px at 10% 15%,rgba(201,164,74,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 25% 8%,rgba(201,164,74,0.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 20%,rgba(201,164,74,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 70% 10%,rgba(201,164,74,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 88% 18%,rgba(201,164,74,0.15) 0%,transparent 100%),radial-gradient(1px 1px at 35% 90%,rgba(255,235,130,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 80% 85%,rgba(255,235,130,0.25) 0%,transparent 100%)"></div>
        <div style="max-width:860px;margin:0 auto;position:relative;z-index:1">
          <div style="text-align:center;font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:#c9a44a;margin-bottom:10px">Flip through the pages</div>
          <div style="text-align:center;font-family:'Playfair Display',Georgia,serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:500;color:#fffcf7;margin-bottom:6px;font-style:italic">${book.title}</div>
          <div style="text-align:center;font-size:0.85rem;color:rgba(255,252,245,0.5);margin-bottom:40px;font-style:italic">${book.subtitle}</div>
          <div id="bp-${bookId}-viewer" style="border-radius:12px;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,0.4);position:relative">`;
      
      book.spreads.forEach((sp,i)=>{
        html+=`<div class="bp-spread${i===0?" active":""}" data-book="${bookId}" data-index="${i}"><img src="images/${book.folder}/${sp}.jpg" alt="${book.pages[i]?.label||sp}" style="width:100%;display:block"></div>`;
      });
      
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(12,26,58,0.95)">
              <button onclick="flipBook('${bookId}',-1)" id="bp-${bookId}-prev" style="background:none;border:1.5px solid rgba(255,255,255,0.15);color:#e8c96e;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s">&#8249;</button>
              <div style="text-align:center">
                <span id="bp-${bookId}-label" style="color:#e8c96e;font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:0.95rem;display:block">${book.pages[0]?.label||"Cover"}</span>
                <span id="bp-${bookId}-desc" style="color:rgba(255,255,255,0.45);font-size:0.72rem;font-style:italic">${book.pages[0]?.desc||""}</span>
              </div>
              <button onclick="flipBook('${bookId}',1)" id="bp-${bookId}-next" style="background:none;border:1.5px solid rgba(255,255,255,0.15);color:#e8c96e;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s">&#8250;</button>
            </div>
          </div>
          <div id="bp-${bookId}-dots" style="display:flex;gap:7px;justify-content:center;margin-top:20px"></div>
          <div style="text-align:center;margin-top:14px">
            <button onclick="deleteSampleBook('${bookId}')" id="bp-${bookId}-del" style="background:none;border:1px solid rgba(139,58,47,0.4);color:#c0553e;padding:6px 18px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Libre Baskerville',Georgia,serif;transition:all 0.2s">Delete Sample Book</button>
            <span id="bp-${bookId}-del-status" style="font-size:12px;color:#8a8578;margin-left:8px"></span>
          </div>
        </div>
      </div>`;
    });
    
    container.innerHTML=html;
    Object.keys(books).forEach(initBook);
    
    // Touch swipe
    Object.keys(books).forEach(bookId=>{
      const viewer=document.getElementById(`bp-${bookId}-viewer`);
      if(!viewer) return;
      let touchX=0;
      viewer.addEventListener("touchstart",function(e){touchX=e.touches[0].clientX;},{passive:true});
      viewer.addEventListener("touchend",function(e){
        const diff=touchX-e.changedTouches[0].clientX;
        if(Math.abs(diff)>50) flipBook(bookId,diff>0?1:-1);
      },{passive:true});
    });
    
  }catch(e){
    container.innerHTML=`<div style="text-align:center;padding:60px;color:#8a8578;font-style:italic">No sample books yet. Generate a book and click "Upload to Sample Books" to add one.</div>`;
  }
}

function initBook(bookId){
  const book=books[bookId];
  if(!book) return;
  const dotsEl=document.getElementById(`bp-${bookId}-dots`);
  if(!dotsEl) return;
  dotsEl.innerHTML="";
  book.pages.forEach(function(_,i){
    const dot=document.createElement("button");
    dot.className="bp-dot"+(i===0?" active":"");
    dot.onclick=function(){goToPage(bookId,i);};
    dotsEl.appendChild(dot);
  });
  goToPage(bookId,0);
}

function goToPage(bookId,idx){
  const book=books[bookId];
  if(!book||idx<0||idx>=book.pages.length) return;
  const viewer=document.getElementById(`bp-${bookId}-viewer`);
  if(!viewer) return;
  const spreads=viewer.querySelectorAll(".bp-spread");
  const dots=document.getElementById(`bp-${bookId}-dots`);
  
  if(spreads[book.current]) spreads[book.current].classList.remove("active");
  if(dots&&dots.children[book.current]) dots.children[book.current].classList.remove("active");
  
  book.current=idx;
  
  if(spreads[book.current]) spreads[book.current].classList.add("active");
  if(dots&&dots.children[book.current]) dots.children[book.current].classList.add("active");
  
  const label=document.getElementById(`bp-${bookId}-label`);
  const desc=document.getElementById(`bp-${bookId}-desc`);
  if(label) label.textContent=book.pages[idx].label;
  if(desc) desc.textContent=book.pages[idx].desc;
  
  const prev=document.getElementById(`bp-${bookId}-prev`);
  const next=document.getElementById(`bp-${bookId}-next`);
  if(prev){prev.disabled=idx===0;prev.style.opacity=idx===0?"0.2":"1";}
  if(next){next.disabled=idx===book.pages.length-1;next.style.opacity=idx===book.pages.length-1?"0.2":"1";}
}

function flipBook(bookId,dir){
  const book=books[bookId];
  if(!book) return;
  goToPage(bookId,book.current+dir);
}

async function deleteSampleBook(bookId){
  if(!confirm(`Delete the sample book "${bookId}"? This will remove all its images from the repository.`)) return;
  
  const token=getGHToken();
  if(!token){alert("GitHub token required to delete.");return;}
  
  const btn=document.getElementById(`bp-${bookId}-del`);
  const status=document.getElementById(`bp-${bookId}-del-status`);
  btn.disabled=true;btn.textContent="Deleting...";
  
  try{
    // 1. Fetch samples.json to find the book entry
    status.textContent="Reading sample index...";
    const sjRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/samples.json?ref=${GH_BRANCH}`,{
      headers:{Authorization:`token ${token}`}
    });
    if(!sjRes.ok) throw new Error("Could not read samples.json");
    const sjData=await sjRes.json();
    const samples=JSON.parse(atob(sjData.content));
    const book=samples.find(s=>s.id===bookId);
    if(!book) throw new Error("Book not found in samples.json");
    
    // 2. Delete all image files in the book's folder
    const folder=`images/${book.folder}`;
    status.textContent="Listing image files...";
    const dirRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${folder}?ref=${GH_BRANCH}`,{
      headers:{Authorization:`token ${token}`}
    });
    if(dirRes.ok){
      const files=await dirRes.json();
      let deleted=0;
      for(const file of files){
        status.textContent=`Deleting ${file.name} (${deleted+1}/${files.length})...`;
        const delRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${folder}/${file.name}`,{
          method:"DELETE",
          headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
          body:JSON.stringify({message:`Delete sample: ${book.folder}/${file.name}`,sha:file.sha,branch:GH_BRANCH})
        });
        if(!delRes.ok) console.warn(`Failed to delete ${file.name}: ${delRes.status}`);
        deleted++;
        await new Promise(r=>setTimeout(r,300));
      }
    }
    
    // 3. Update samples.json — remove this book
    status.textContent="Updating sample index...";
    const updated=samples.filter(s=>s.id!==bookId);
    const updatedB64=btoa(unescape(encodeURIComponent(JSON.stringify(updated,null,2))));
    const putRes=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/samples.json`,{
      method:"PUT",
      headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({message:`Remove sample book: ${bookId}`,content:updatedB64,sha:sjData.sha,branch:GH_BRANCH})
    });
    if(!putRes.ok) throw new Error("Failed to update samples.json");
    
    status.innerHTML=`<span style="color:#4a7a4a">Deleted! Refreshing...</span>`;
    // Reload the sample books tab
    setTimeout(()=>loadSampleBooks(),1000);
    
  }catch(e){
    status.innerHTML=`<span style="color:#8b3a2f">${e.message}</span>`;
    btn.textContent="Retry Delete";
    btn.disabled=false;
  }
}

</script>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const STEPS = ["config","refsheet","story","images","preview","export"];
const LABELS = {config:"Setup",refsheet:"Ref Sheet",story:"Story",images:"Images",preview:"Preview",export:"Export"};
const IW=11.625,IH=6.0,CW=12.125,CH=6.0;
const GP={boy:{s:"he",o:"him",p:"his"},girl:{s:"she",o:"her",p:"her"}};

let state = {
  step: "config",
  config: {
    dog_name:"Buddy",baby_name:"George",baby_gender:"boy",breed:"Golden Retriever",
    coat_description:"Golden white, fluffy, friendly eyes",baby_description:"",favorite_toy:"",pajama_color:"blue",
    pajama_description:"blue pajamas, soft and bright with little golden stars on every inch",
    openai_key:"",
    img_quality:"medium", // "medium" for drafts, "high" for final
    dog_photos:[], // [{b64}]
    baby_photos:[]
  },
  dogSheet: null,      // b64 data url of the dog reference sheet
  babySheet: null,     // b64 data url of the baby reference sheet
  charDesc: null,      // no longer used — both characters are ref-sheet-only
  story: null,         // {spreads: [{spread_number, stanza}]}
  images: {},          // id -> b64 data url
  generating: null,    // current generating image id
  error: null,
  loading: false,
  exported: {}
};

// ═══════════════════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════════════════
async function chatAPI(sys,usr,temp){
  const k=state.config.openai_key;
  const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${k}`},body:JSON.stringify({model:"gpt-4o",messages:[{role:"system",content:sys},{role:"user",content:usr}],temperature:temp||0.8,max_tokens:2000})});
  if(!r.ok) throw new Error(`Chat API error ${r.status}: ${(await r.text()).slice(0,300)}`);
  return (await r.json()).choices[0].message.content;
}

async function imgWithRefs(prompt,refImages){
  // Use the Responses API with gpt-4.1 — strong vision/reasoning for reference sheet matching
  // Reference images go in as context (input_image), model generates a NEW image using them as reference
  const k=state.config.openai_key;
  const photos=refImages.filter(Boolean);
  
  const content=[];

  const r=await fetch("https://api.openai.com/v1/responses",{
    method:"POST",

      model:"gpt-4.1",

      tools:[{type:"image_generation",quality:state.config.img_quality,size:"1536x1024"}],

    })
  });

}

// Pre-crop image to target aspect ratio (like object-fit:cover)
function cropToFit(imgSrc, targetW, targetH, bias){
  // bias: 'center' (default), 'right' (keep right side), 'left' (keep left side)
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const iw=img.naturalWidth, ih=img.naturalHeight;
      const targetRatio=targetW/targetH;
      const imgRatio=iw/ih;
      let sx=0,sy=0,sw=iw,sh=ih;
      if(imgRatio>targetRatio){
        // image is wider — crop sides
        sw=ih*targetRatio;
        const totalCrop=iw-sw;
        if(bias==='right'){
          // keep the right side — crop more from left
          sx=totalCrop*0.7;
        } else if(bias==='left'){
          // keep the left side — crop more from right
          sx=totalCrop*0.3;
        } else {
          // center crop — slightly biased right since characters tend to be center-right
          sx=totalCrop*0.55;
        }
      } else {
        // image is taller — crop top/bottom
        sh=iw/targetRatio;
        const totalCropV=ih-sh;
        if(bias==='bottom'){
          // keep the bottom — crop entirely from top (preserve treeline/constellation/house)
          sy=totalCropV;
        } else if(bias==='top'){
          // keep the top — crop more from bottom
          sy=totalCropV*0.2;
        } else {
          sy=totalCropV/2;
        }
      }
      const canvas=document.createElement("canvas");
      // Use a reasonable resolution for print (300dpi equivalent)
      const scale=Math.min(3, Math.max(1, 2400/Math.max(sw,sh)));
      canvas.width=Math.round(sw*scale);
      canvas.height=Math.round(sh*scale);
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror=reject;
    img.src=imgSrc;
  });
}

async function makePDF(item){
  // Ensure Playfair Display is fully loaded before rendering text to canvas
  await document.fonts.ready;
  const J=jspdf.jsPDF;
  const w=item.cv?CW:IW, h=item.cv?CH:IH;
  const doc=new J({orientation:"landscape",unit:"in",format:[w,h]});
  const hf=w/2;

  if(item.panoramic){
    // Full-bleed panoramic image across both pages
    // Center crop — splits 232px evenly (116px top, 116px bottom) to preserve both constellation and treeline
    if(item.li) try{const cr=await cropToFit(item.li,w,h);doc.addImage(cr,"PNG",0,0,w,h)}catch(e){}
    return doc;
  }

  if(item.textPage){
    // LEFT PAGE: solid dark background with centered text
    const bg=item.bgColor||"#1e2a4a";
    const r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16);
    doc.setFillColor(r,g,b);
    doc.rect(0,0,hf,h,"F");

    if(item.lt){
      // Render stanza text using Playfair Display via canvas
      const stanzaCanvas=document.createElement("canvas");
      const sDpi=300;
      const scw=Math.round(hf*sDpi), sch=Math.round(h*sDpi);
      stanzaCanvas.width=scw; stanzaCanvas.height=sch;
      const sctx=stanzaCanvas.getContext("2d");
      
      const lines=item.lt.split("\n");
      
      // Find the right font size — start at 6% of width, shrink if any line is too wide
      let fontSize=Math.round(scw*0.06);
      const maxWidth=scw*0.85;
      sctx.font=`italic ${fontSize}px 'Playfair Display', Georgia, serif`;
      const widest=Math.max(...lines.map(l=>sctx.measureText(l).width));
      if(widest>maxWidth){
        fontSize=Math.round(fontSize*(maxWidth/widest));
        sctx.font=`italic ${fontSize}px 'Playfair Display', Georgia, serif`;
      }
      
      sctx.fillStyle="#f5eedd";
      sctx.textAlign="center";
      sctx.textBaseline="middle";
      
      const lineH=fontSize*1.8;
      const totalH=lines.length*lineH;
      const startY=(sch-totalH)/2+lineH/2;
      lines.forEach((line,i)=>{
        sctx.fillText(line, scw/2, startY+i*lineH);
      });
      
      doc.addImage(stanzaCanvas.toDataURL("image/png"),"PNG",0,0,hf,h);
    }

    // RIGHT PAGE: full-bleed illustration (crop to fit like object-fit:cover)
    if(item.ri) try{const cr=await cropToFit(item.ri,hf,h);doc.addImage(cr,"PNG",hf,0,hf,h)}catch(e){}
    return doc;
  }

  // Cover layout: back cover (left) | spine | front cover (right)
  const spine=0.5; // spine width in inches for 16-page board book
  const coverW=(w-spine)/2; // width of each cover panel
  
  // Back cover image (left side)
  if(item.li) try{const cr=await cropToFit(item.li,coverW,h);doc.addImage(cr,"PNG",0,0,coverW,h)}catch(e){}
  
  // Spine — solid navy
  doc.setFillColor(16,30,60);
  doc.rect(coverW,0,spine,h,"F");
  
  // Front cover image (right side)
  if(item.ri) try{const cr=await cropToFit(item.ri,coverW,h);doc.addImage(cr,"PNG",coverW+spine,0,coverW,h)}catch(e){}
  
  // If this is the cover, add branding to the back cover (title text is baked into the AI-generated front cover image)
  if(item.cv && state.config){
    const c=state.config;
    const dpi=300;

    // Brand on back cover (left side)
    const bcvs=document.createElement("canvas");
    bcvs.width=Math.round(coverW*dpi); bcvs.height=Math.round(h*dpi);
    const bctx=bcvs.getContext("2d");
    bctx.font=`bold ${Math.round(bcvs.width*0.05)}px 'Playfair Display', Georgia, serif`;
    bctx.fillStyle="#b8a06a";
    bctx.textAlign="center";
    bctx.textBaseline="middle";
    bctx.save();
    bctx.shadowColor="rgba(0,0,0,0.3)";
    bctx.shadowBlur=Math.round(bcvs.width*0.005);
    bctx.shadowOffsetX=1;
    bctx.shadowOffsetY=2;
    bctx.fillText("Moonpaw Prints", bcvs.width/2, bcvs.height*0.92);
    bctx.restore();
    doc.addImage(bcvs.toDataURL("image/png"),"PNG",0,0,coverW,h);
  }
  return doc;
}

async function makeTitlePDF(){
  // Ensure Playfair Display is fully loaded before rendering text to canvas
  await document.fonts.ready;
  const J=jspdf.jsPDF;
  const c=state.config;
  const w=IW,h=IH;
  const doc=new J({orientation:"landscape",unit:"in",format:[w,h]});
  const hf=w/2;
  
  // Left page — deep navy
  doc.setFillColor(30,42,74);
  doc.rect(0,0,hf,h,"F");
  
  // Right page — AI-generated decorative background
  const bgImg=state.images.tp;
  if(bgImg){
    try{
      const cr=await cropToFit(bgImg,hf,h);
      doc.addImage(cr,"PNG",hf,0,hf,h);
    }catch(e){
      // Fallback: cream background
      doc.setFillColor(245,240,229);
      doc.rect(hf,0,hf,h,"F");
    }
  } else {
    // Fallback: cream background
    doc.setFillColor(245,240,229);
    doc.rect(hf,0,hf,h,"F");
  }
  
  // Render title text onto a canvas using Playfair Display, then place as image
  // This gives us the premium font without jsPDF font embedding
  const textCanvas=document.createElement("canvas");
  const dpi=300;
  const cpw=Math.round(hf*dpi), cph=Math.round(h*dpi);
  textCanvas.width=cpw;
  textCanvas.height=cph;
  const ctx=textCanvas.getContext("2d");
  
  // Helper to draw centered text with auto-sizing for long strings
  function drawText(text, yRatio, maxFontSize, color, fontWeight, fontStyle){
    // Canvas font syntax: "italic bold 48px FontName" (style before weight)
    let fontSize=maxFontSize;
    const buildFont=(sz)=>`${fontStyle?fontStyle+" ":""}${fontWeight?fontWeight+" ":""}${sz}px 'Playfair Display', Georgia, serif`;
    
    // Auto-shrink if text is too wide (keep within 90% of canvas width)
    ctx.font=buildFont(fontSize);
    while(ctx.measureText(text).width > cpw*0.9 && fontSize > maxFontSize*0.5){
      fontSize-=Math.round(maxFontSize*0.05);
      ctx.font=buildFont(fontSize);
    }
    
    ctx.fillStyle=color;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    
    // Text shadow for depth
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,0.08)";
    ctx.shadowBlur=fontSize*0.08;
    ctx.shadowOffsetX=fontSize*0.02;
    ctx.shadowOffsetY=fontSize*0.03;
    ctx.fillText(text, cpw/2, cph*yRatio);
    ctx.restore();
  }
  
  // "Goodnight," — large navy bold
  drawText("Goodnight,", 0.28, Math.round(cpw*0.12), "#1e2a4a", "bold", "");
  
  // Dog name — larger navy bold
  drawText(c.dog_name+"!", 0.44, Math.round(cpw*0.14), "#1e2a4a", "bold", "");
  
  // Subtitle — smaller brown/sepia italic
  drawText("A Bedtime Story", 0.60, Math.round(cpw*0.055), "#7a6b55", "", "italic");
  drawText("for Baby "+c.baby_name, 0.67, Math.round(cpw*0.055), "#7a6b55", "", "italic");
  
  // Decorative line
  ctx.strokeStyle="#b8a06a";
  ctx.lineWidth=2;
  const lineW=cpw*0.2;
  ctx.beginPath();
  ctx.moveTo(cpw/2-lineW/2, cph*0.75);
  ctx.lineTo(cpw/2+lineW/2, cph*0.75);
  ctx.stroke();
  
  // Brand — gold
  drawText("Moonpaw Prints", 0.83, Math.round(cpw*0.045), "#b8a06a", "bold", "");
  
  // Place the text canvas as an image on the right half of the PDF
  const textDataUrl=textCanvas.toDataURL("image/png");
  doc.addImage(textDataUrl,"PNG",hf,0,hf,h);
  
  return doc;
}

function renderStepBar(){

    const curCls=i===idx?" current":"";

    const lblC=i<=idx?"#1e2a4a":"#8a8578";

function renderPhotoSlots(containerId,photos,max,stateKey){

function addPhotos(key,input,max){
  const files=Array.from(input.files||[]);
  const remaining=max-state.config[key].length;
  files.slice(0,remaining).forEach(f=>{
    const reader=new FileReader();
    reader.onload=(ev)=>{
      state.config[key].push({b64:ev.target.result});
      if(state.step==="config") saveFormToState();
      render();
    };
    reader.readAsDataURL(f);
  });
}

function removePhoto(key,idx){
  state.config[key].splice(idx,1);
  if(state.step==="config") saveFormToState();
  render();
}

    const babyPhotos=c.baby_photos.map(p=>p.b64);

    if(which==="both"||which==="dog"){
      state.loading="dog";render();
      const dogPrompt=dogSheetPrompt();
      if(dogPhotos.length>0){
        state.dogSheet=await imgWithRefs(dogPrompt,dogPhotos);

        state.dogSheet=await imgGen(dogPrompt);

    }
    
    // Generate BABY reference sheet

async function generateStory(){
  state.loading=true;state.error=null;render();
  try{
    const raw=await chatAPI(STORY_SYS,storyPrompt());
    let cleaned=raw.replace(/```json\s?/g,"").replace(/```/g,"").trim();
    
    // Try direct parse first
    try{
      state.story=JSON.parse(cleaned);
    }catch(e1){
      // Fix common JSON issues from LLMs
      // 1. Extract just the JSON object if there's surrounding text
      const jsonMatch=cleaned.match(/\{[\s\S]*\}/);
      if(jsonMatch) cleaned=jsonMatch[0];
      
      // 2. Fix unescaped newlines inside strings
      cleaned=cleaned.replace(/(?<=":[ ]*")([\s\S]*?)(?="[ ]*[,}])/g, function(match){
        return match.replace(/\n/g,"\\n").replace(/\r/g,"");
      });
      
      // 3. Fix smart quotes
      cleaned=cleaned.replace(/[\u201C\u201D]/g,'"').replace(/[\u2018\u2019]/g,"'");
      
      // 4. Fix trailing commas
      cleaned=cleaned.replace(/,\s*}/g,"}").replace(/,\s*]/g,"]");
      
      try{
        state.story=JSON.parse(cleaned);
      }catch(e2){
        // Last resort: try to extract spreads with regex
        const spreads=[];
        const spreadRegex=/"spread_number"\s*:\s*(\d+)\s*,\s*"stanza"\s*:\s*"((?:[^"\\]|\\.)*)"/g;
        let m;
        while((m=spreadRegex.exec(raw))!==null){
          spreads.push({spread_number:parseInt(m[1]),stanza:m[2].replace(/\\n/g,"\n")});
        }
        if(spreads.length>=4){
          state.story={spreads};
        }else{
          throw new Error("Could not parse story. Tap Retry — sometimes the model needs a second attempt.");
        }
      }
    }
  }catch(e){state.error=e.message;}
  state.loading=false;render();
}

function approveStory(){
  state.story.spreads.forEach((sp,i)=>{
    const t=document.getElementById(`st-${i}`);
    if(t) sp.stanza=t.value;

  state.step="images";render();

let abortImages=false;

async function genOneImage(id){
  const prompts=getSpreadPrompts();
  const p=prompts.find(x=>x.id===id);
  if(!p) return;
  state.generating=p.id;state.error=null;render();
  try{
    const refs=[state.dogSheet,state.babySheet].filter(Boolean);
    const img=p.noRef ? await imgGen(p.prompt) : await imgWithRefs(p.prompt,refs);
    state.images[p.id]=img;
  }catch(e){state.error=`${p.label}: ${e.message}`;}
  state.generating=null;render();
}

async function genAllImages(){
  abortImages=false;
  const prompts=getSpreadPrompts();
  for(let i=0;i<prompts.length;i++){
    if(abortImages) break;
    if(state.images[prompts[i].id]) continue;
    state.generating=prompts[i].id;state.error=null;render();
    try{
      const p=prompts[i];
      const refs=[state.dogSheet,state.babySheet].filter(Boolean);
      const img=p.noRef ? await imgGen(p.prompt) : await imgWithRefs(p.prompt,refs);
      state.images[p.id]=img;
    }catch(e){
      state.error=`${prompts[i].label}: ${e.message}`;
      state.generating=null;render();return;
    }
    if(i<prompts.length-1&&!abortImages) await new Promise(r=>setTimeout(r,2000));
  }
  state.generating=null;render();
}

// ── GITHUB UPLOAD ───────────────────────────────────────────────────────
// Token is entered at runtime — NEVER hardcode secrets in source files
function getGHToken(){
  let t=sessionStorage.getItem("gh_token");
  if(!t){
    t=prompt("Enter your GitHub Personal Access Token for upload:");
    if(t) sessionStorage.setItem("gh_token",t);
  }
  return t;
}
const GH_REPO="joshuakingsland/moonpawprints.com";
const GH_BRANCH="main";

function resizeImageToJpeg(dataUrl, maxWidth){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(maxWidth/img.naturalWidth,1);
      const w=Math.round(img.naturalWidth*ratio);
      const h=Math.round(img.naturalHeight*ratio);
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      // Return base64 without the data:image/jpeg;base64, prefix
      const jpegDataUrl=canvas.toDataURL("image/jpeg",0.85);
      resolve(jpegDataUrl.split(",")[1]);
    };
    img.src=dataUrl;
  });
}

async function ghPut(path, contentBase64, message){
  const token=getGHToken();
  if(!token) throw new Error("GitHub token not provided");
  // Check if file exists first (to get sha for update)
  let sha=null;
  try{
    const check=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}?ref=${GH_BRANCH}`,{
      headers:{Authorization:`token ${token}`}
    });
    if(check.ok){
      const data=await check.json();
      sha=data.sha;
    }
  }catch(e){}
  
  const body={message,content:contentBase64,branch:GH_BRANCH};
  if(sha) body.sha=sha;
  
  const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`,{
    method:"PUT",
    headers:{Authorization:`token ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error(`GitHub upload failed for ${path}: ${r.status} ${await r.text()}`);
  return r.json();
}

// Render a full composite spread (text + art) to a data URL for sample upload
async function renderSpreadToCanvas(type, opts){
  await document.fonts.ready;
  const c=state.config;
  // Use a web-friendly resolution (not full 300dpi print res)
  const canvasW=2400, canvasH=Math.round(2400*(IH/IW));
  const canvas=document.createElement("canvas");
  canvas.width=canvasW; canvas.height=canvasH;
  const ctx=canvas.getContext("2d");
  const halfW=canvasW/2;

  if(type==="title"){
    // Left half: deep navy
    ctx.fillStyle="#1e2a4a";
    ctx.fillRect(0,0,halfW,canvasH);
    // Right half: AI background image
    if(opts.bgImg){
      const img=await loadImg(opts.bgImg);
      drawCover(ctx,img,halfW,0,halfW,canvasH);
    } else {
      ctx.fillStyle="#f5f0e5";
      ctx.fillRect(halfW,0,halfW,canvasH);
    }
    // Title text on right half
    const txCtx=ctx;
    function titleText(text,yRatio,maxFS,color,weight,style){
      let fs=maxFS;
      const buildFont=(sz)=>`${style?style+" ":""}${weight?weight+" ":""}${sz}px 'Playfair Display', Georgia, serif`;
      txCtx.font=buildFont(fs);
      while(txCtx.measureText(text).width>halfW*0.9&&fs>maxFS*0.5){fs-=Math.round(maxFS*0.05);txCtx.font=buildFont(fs);}
      txCtx.fillStyle=color;txCtx.textAlign="center";txCtx.textBaseline="middle";
      txCtx.save();txCtx.shadowColor="rgba(0,0,0,0.08)";txCtx.shadowBlur=fs*0.08;
      txCtx.fillText(text,halfW+halfW/2,canvasH*yRatio);txCtx.restore();
    }
    titleText("Goodnight,",0.28,Math.round(halfW*0.12),"#1e2a4a","bold","");
    titleText(c.dog_name+"!",0.44,Math.round(halfW*0.14),"#1e2a4a","bold","");
    titleText("A Bedtime Story",0.60,Math.round(halfW*0.055),"#7a6b55","","italic");
    titleText("for Baby "+c.baby_name,0.67,Math.round(halfW*0.055),"#7a6b55","","italic");
    titleText("Moonpaw Prints",0.83,Math.round(halfW*0.045),"#b8a06a","bold","");

  } else if(type==="story"){
    // Left half: solid bg + stanza text
    ctx.fillStyle=opts.bgColor||"#1e2a4a";
    ctx.fillRect(0,0,halfW,canvasH);
    if(opts.stanza){
      const lines=opts.stanza.split("\n");
      let fs=Math.round(halfW*0.06);
      const buildFont=(sz)=>`italic ${sz}px 'Playfair Display', Georgia, serif`;
      ctx.font=buildFont(fs);
      const maxW=halfW*0.85;
      const widest=Math.max(...lines.map(l=>ctx.measureText(l).width));
      if(widest>maxW){fs=Math.round(fs*(maxW/widest));ctx.font=buildFont(fs);}
      ctx.fillStyle="#f5eedd";ctx.textAlign="center";ctx.textBaseline="middle";
      const lineH=fs*1.8, totalH=lines.length*lineH;
      const startY=(canvasH-totalH)/2+lineH/2;
      lines.forEach((line,i)=>ctx.fillText(line,halfW/2,startY+i*lineH));
    }
    // Right half: illustration
    if(opts.artImg){
      const img=await loadImg(opts.artImg);
      drawCover(ctx,img,halfW,0,halfW,canvasH);
    }

  } else if(type==="panoramic"){
    // Full-bleed image across both pages
    if(opts.artImg){
      const img=await loadImg(opts.artImg);
      drawCover(ctx,img,0,0,canvasW,canvasH);
    } else {
      ctx.fillStyle="#0e1030";ctx.fillRect(0,0,canvasW,canvasH);
    }

  } else if(type==="cover"){
    // Back | Spine | Front
    const spineW=Math.round(canvasW*(0.5/CW));
    const panelW=Math.round((canvasW-spineW)/2);
    if(opts.backImg){const img=await loadImg(opts.backImg);drawCover(ctx,img,0,0,panelW,canvasH);}
    ctx.fillStyle="#101e3c";ctx.fillRect(panelW,0,spineW,canvasH);
    if(opts.frontImg){const img=await loadImg(opts.frontImg);drawCover(ctx,img,panelW+spineW,0,panelW,canvasH);}
    // Title text is baked into the AI-generated front cover image — no programmatic overlay needed
    // Brand on back
    ctx.font=`bold ${Math.round(panelW*0.05)}px 'Playfair Display', Georgia, serif`;
    ctx.fillStyle="#b8a06a";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.save();ctx.shadowColor="rgba(0,0,0,0.3)";ctx.shadowBlur=Math.round(panelW*0.005);
    ctx.fillText("Moonpaw Prints",panelW/2,canvasH*0.92);ctx.restore();
  }
  return canvas.toDataURL("image/jpeg",0.85);
}

// Helper: load an image src into an Image element
function loadImg(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src;
  });
}

// Helper: draw image to fill a region (like object-fit:cover)
function drawCover(ctx,img,dx,dy,dw,dh){
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const targetRatio=dw/dh, imgRatio=iw/ih;
  let sx=0,sy=0,sw=iw,sh=ih;
  if(imgRatio>targetRatio){sw=ih*targetRatio;sx=(iw-sw)/2;}
  else{sh=iw/targetRatio;sy=(ih-sh)/2;}
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);
}

async function uploadToSampleBooks(){
  const statusEl=document.getElementById("upload-status");
  const btn=document.getElementById("btn-upload-samples");
  btn.disabled=true;
  btn.textContent="Uploading...";
  
  try{
    const c=state.config;
    const dogFolder=c.dog_name.toLowerCase().replace(/[^a-z0-9]/g,"");
    const basePath=`images/${dogFolder}`;
    const bgColors=["#2a3a5e","#243256","#1e2a4e","#182246","#131c3e","#0e1636"];
    
    // Build list of composite spreads to render and upload
    const spreads=[];
    
    // Cover (back + spine + front composite)
    if(state.images.cf||state.images.cb){
      spreads.push({name:"cover",render:()=>renderSpreadToCanvas("cover",{frontImg:state.images.cf,backImg:state.images.cb})});
    }
    
    // Title page (navy left + AI bg with title text right)
    if(state.images.tp){
      spreads.push({name:"1-2",render:()=>renderSpreadToCanvas("title",{bgImg:state.images.tp})});
    }
    
    // Story spreads (text left + illustration right)
    if(state.story){
      state.story.spreads.forEach((sp,i)=>{
        const artImg=state.images["s"+sp.spread_number];
        if(artImg){
          spreads.push({
            name:`${sp.spread_number*2-1}-${sp.spread_number*2}`,
            render:()=>renderSpreadToCanvas("story",{
              artImg,
              stanza:sp.stanza||sp.left_stanza||"",
              bgColor:bgColors[i]||bgColors[bgColors.length-1]
            })
          });
        }
      });
    }
    
    // Constellation (full panoramic)
    if(state.images.s8){
      spreads.push({name:"15-16",render:()=>renderSpreadToCanvas("panoramic",{artImg:state.images.s8})});
    }
    
    // Render and upload each composite spread
    let uploaded=0;
    for(const sp of spreads){
      statusEl.textContent=`Rendering & uploading ${sp.name}.jpg (${uploaded+1}/${spreads.length})...`;
      const dataUrl=await sp.render();
      const b64=dataUrl.split(",")[1];
      await ghPut(`${basePath}/${sp.name}.jpg`, b64, `Add sample: ${c.dog_name} - ${sp.name}`);
      uploaded++;
      await new Promise(r=>setTimeout(r,500)); // rate limit buffer
    }
    
    // Now update samples.json
    statusEl.textContent="Updating sample book index...";
    
    // Fetch existing samples.json
    let samples=[];
    try{
      const r=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/samples.json?ref=${GH_BRANCH}`,{
        headers:{Authorization:`token ${getGHToken()}`}
      });
      if(r.ok){
        const data=await r.json();
        samples=JSON.parse(atob(data.content));
      }
    }catch(e){}
    
    // Add or update this book
    const bookEntry={
      id:dogFolder,
      title:`Goodnight, ${c.dog_name}!`,
      subtitle:`A Bedtime Story for Baby ${c.baby_name}`,
      folder:dogFolder,
      spreads:spreads.map(s=>s.name),
      pages:[
        {label:"Cover",desc:""},
        {label:"Title Page",desc:"Pages 1–2"},
      ]
    };
    // Add spread page labels
    if(state.story){
      const scenes=["Sunset & Yawn","Getting Cozy","Reading Together","Stargazing","Guardian","Goodnight"];
      state.story.spreads.forEach((sp,i)=>{
        bookEntry.pages.push({label:scenes[i]||`Spread ${sp.spread_number}`,desc:`Pages ${sp.spread_number*2-1}–${sp.spread_number*2}`});
      });
    }
    bookEntry.pages.push({label:"Constellation",desc:"Pages 15–16"});
    
    // Replace existing entry or add new
    const existIdx=samples.findIndex(s=>s.id===dogFolder);
    if(existIdx>=0) samples[existIdx]=bookEntry;
    else samples.push(bookEntry);
    
    // Upload samples.json
    const samplesB64=btoa(unescape(encodeURIComponent(JSON.stringify(samples,null,2))));
    await ghPut("samples.json",samplesB64,`Update samples: add ${c.dog_name}`);
    
    statusEl.innerHTML=`<span style="color:#4a7a4a">✅ Uploaded ${uploaded} images to ${basePath}/</span>`;
    btn.textContent="✅ Uploaded!";
    btn.disabled=false;
    
  }catch(e){
    statusEl.innerHTML=`<span style="color:#8b3a2f">❌ ${e.message}</span>`;
    btn.textContent="Retry Upload";
    btn.disabled=false;
  }
}

  if(!s) return;
  try{
    const doc=s.isTitle ? await makeTitlePDF() : await makePDF(s);
    doc.save(s.f);
    state.exported[s.n]=true;
    render();
  }catch(e){alert("Export failed: "+e.message);}
}

async function exportAll(){
  const list=getExportList();
  for(const s of list){
    try{
      const doc=s.isTitle ? await makeTitlePDF() : await makePDF(s);
      doc.save(s.f);
      state.exported[s.n]=true;
      render();
      await new Promise(r=>setTimeout(r,400));
    }catch(e){console.error(e);}
  }
}
